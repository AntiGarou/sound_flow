name: Android Prototype Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Removed hardcoded flutter-version to use the absolute latest stable (3.29+)
          # This resolves the Color.toARGB32() missing method error.

      - name: Generate Android Platform Files
        run: |
          # Generate a temporary flutter project to get the android folder
          flutter create --project-name soundflow_app --org com.soundflow --platforms android temp_app
          # Move the android folder into our app directory
          mv temp_app/android apps/soundflow_app/
          rm -rf temp_app

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap Workspace
        run: melos bootstrap

      - name: Build APK
        run: |
          cd apps/soundflow_app
          flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: soundflow-prototype-apk
          path: apps/soundflow_app/build/app/outputs/flutter-apk/app-release.apk
